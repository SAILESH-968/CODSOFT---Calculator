<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standalone Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif}
.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.3s}
.app.dark{
background:
radial-gradient(circle at 20% 20%, #0ff 0%, transparent 25%),
radial-gradient(circle at 80% 30%, #ff00ff 0%, transparent 30%),
radial-gradient(circle at 50% 80%, #00f7ff 0%, transparent 35%),#05010a;
color:white;
}
.app.light{background:#f5f5f5;color:black}
.theme-btn{position:fixed;top:20px;right:20px;padding:10px 14px;border-radius:10px;cursor:pointer}
.history-panel{width:340px;max-height:180px;overflow-y:auto;margin-bottom:15px;padding:10px;border-radius:12px;background:rgba(255,255,255,.08)}
.calculator{width:360px;padding:22px;border-radius:18px;background:rgba(10,10,20,.8)}
.display-container{background:rgba(0,0,0,.35);padding:18px;border-radius:14px;margin-bottom:18px;text-align:right}
.current-operand{font-size:34px;font-weight:bold;color:#00ffd5}
.previous-operand{font-size:14px;opacity:.7}
.button-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
button{height:60px;border-radius:14px;cursor:pointer}
.equals-btn{grid-column:span 2}
</style>
</head>
<body>
<div id="app" class="app dark">
<button class="theme-btn" onclick="toggleTheme()">🌙 Dark</button>

<div class="history-panel">
<h3>History</h3>
<button onclick="clearHistory()">Clear History</button>
<div id="history">No calculations yet</div>
</div>

<div class="calculator">
<div class="display-container">
<div class="previous-operand" id="previous"></div>
<div class="current-operand" id="current">0</div>
</div>

<div class="button-grid">
<button onclick="clearCalc()">AC</button>
<button onclick="del()">⌫</button>
<button onclick="chooseOp('÷')">÷</button>
<button onclick="chooseOp('×')">×</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="chooseOp('-')">-</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="chooseOp('+')">+</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('.')">.</button>

<button onclick="append('0')">0</button>
<button class="equals-btn" onclick="compute()">=</button>
<button onclick="percent()">%</button>
</div>
</div>
</div>

<script>
let current='0', previous='', operation=null, dark=true, history=[];

function update(){
document.getElementById('current').textContent=current;
document.getElementById('previous').textContent=(previous+' '+(operation||''));
const h=document.getElementById('history');
h.innerHTML=history.length?history.map(x=>'<div>'+x+'</div>').join(''):'No calculations yet';
}

function append(n){
if(current==='0' && n!=='.') current=n;
else{
if(n==='.' && current.includes('.')) return;
current+=n;
}
update();
}

function chooseOp(op){
if(current==='') return;
operation=op;
previous=current;
current='';
update();
}

function compute(){
const prev=parseFloat(previous), curr=parseFloat(current);
if(isNaN(prev)||isNaN(curr)) return;
let result=0;
if(operation==='+') result=prev+curr;
if(operation==='-') result=prev-curr;
if(operation==='×') result=prev*curr;
if(operation==='÷') result=prev/curr;
history.unshift(`${prev} ${operation} ${curr} = ${result}`);
current=String(result);
previous='';
operation=null;
update();
}

function clearCalc(){current='0';previous='';operation=null;update();}
function del(){current=current.slice(0,-1)||'0';update();}
function percent(){current=String(parseFloat(current)/100);update();}
function clearHistory(){history=[];update();}

function toggleTheme(){
dark=!dark;
const app=document.getElementById('app');
const btn=document.querySelector('.theme-btn');
app.className='app '+(dark?'dark':'light');
btn.textContent=dark?'🌙 Dark':'☀️ Light';
}
update();
</script>
</body>
</html>
